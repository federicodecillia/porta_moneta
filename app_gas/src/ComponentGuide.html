<script>
/* ───────────────────────────────────────────
   ComponentGuide — Guida per soci e admin
   ─────────────────────────────────────────── */

PM.components.guide = {

  load: function() {
    var isAdmin = PM.state.session && PM.state.session.role === 'admin';
    var html = '';

    html += '<h1 class="mb-16">Guida</h1>';

    // ── SEZIONE SOCI ──
    html +=
      '<div class="card">' +
        '<h2 style="color:var(--brand-deep);">Come ordinare</h2>' +
        '<div class="guide-steps">' +
          '<div class="guide-step">' +
            '<div class="guide-num">1</div>' +
            '<div><strong>Apri l\'app</strong><br>' +
              '<span class="text-muted text-sm">Usa il link che hai ricevuto. Ti consigliamo di aggiungerlo alla schermata Home del telefono per accedere con un tap.</span></div>' +
          '</div>' +
          '<div class="guide-step">' +
            '<div class="guide-num">2</div>' +
            '<div><strong>Controlla se c\'è un ordine aperto</strong><br>' +
              '<span class="text-muted text-sm">Nella Home vedrai se c\'è un ordine aperto, il fornitore e quando chiude. Se è chiuso, dovrai aspettare il prossimo.</span></div>' +
          '</div>' +
          '<div class="guide-step">' +
            '<div class="guide-num">3</div>' +
            '<div><strong>Vai al tab Ordini</strong><br>' +
              '<span class="text-muted text-sm">Clicca sull\'icona del carrello in basso. Sul sotto-tab <strong>Aperti</strong> vedrai i prodotti disponibili.</span></div>' +
          '</div>' +
          '<div class="guide-step">' +
            '<div class="guide-num">4</div>' +
            '<div><strong>Scegli le quantità</strong><br>' +
              '<span class="text-muted text-sm">Usa i pulsanti <strong>+</strong> e <strong>−</strong> per ogni prodotto. Il totale e il saldo residuo si aggiornano in basso.</span></div>' +
          '</div>' +
          '<div class="guide-step">' +
            '<div class="guide-num">5</div>' +
            '<div><strong>Salva l\'ordine</strong><br>' +
              '<span class="text-muted text-sm">Premi il pulsante verde <strong>Salva ordine</strong>. Puoi modificarlo finché l\'ordine è aperto. ' +
              'Se il saldo residuo è negativo, il pulsante si disabilita: riduci l\'ordine o chiedi alla tesoriera di registrare un bonifico.</span></div>' +
          '</div>' +
        '</div>' +
      '</div>';

    // Saldo e pagamenti
    html +=
      '<div class="card">' +
        '<h2 style="color:var(--brand-deep);">Saldo e pagamenti</h2>' +
        '<ul class="guide-list">' +
          '<li>Il <strong>saldo</strong> è visibile nella Home. Rappresenta il tuo credito presso l\'associazione.</li>' +
          '<li>Alla chiusura di un ordine, il costo viene <strong>addebitato automaticamente</strong> dal saldo.</li>' +
          '<li>Non puoi salvare un ordine che porterebbe il saldo sotto zero: aggiungi un bonifico o riduci l\'ordine.</li>' +
          '<li>Per ricaricare il saldo, effettua un <strong>bonifico</strong> sul conto dell\'associazione. La tesoriera lo registrerà nell\'app.</li>' +
          '<li>Se il saldo è <span style="color:var(--danger);font-weight:600;">negativo</span>, significa che devi effettuare un bonifico.</li>' +
        '</ul>' +
      '</div>';

    // Storico ordini e movimenti
    html +=
      '<div class="card">' +
        '<h2 style="color:var(--brand-deep);">Storico</h2>' +
        '<ul class="guide-list">' +
          '<li>Dentro al tab <strong>Ordini</strong> trovi tre sotto-tab:</li>' +
          '<li><strong>Aperti</strong>: l\'ordine in corso, se c\'è.</li>' +
          '<li><strong>Storico ordini</strong>: i tuoi ordini passati. Tocca un ordine per vedere il dettaglio dei prodotti.</li>' +
          '<li><strong>Storico movimenti</strong>: tutti i movimenti del saldo (bonifici, addebiti ordini, rettifiche).</li>' +
        '</ul>' +
      '</div>';

    // Suggerimento schermata home
    html +=
      '<div class="card" style="background:var(--brand-light);">' +
        '<h2>Aggiungi alla schermata Home</h2>' +
        '<ul class="guide-list">' +
          '<li><strong>iPhone (Safari)</strong>: tocca l\'icona di condivisione (quadrato con freccia) → "Aggiungi a schermata Home".</li>' +
          '<li><strong>Android (Chrome)</strong>: tocca i tre puntini in alto → "Aggiungi a schermata Home".</li>' +
        '</ul>' +
      '</div>';

    // ── SEZIONE ADMIN ──
    if (isAdmin) {
      html +=
        '<div style="margin-top:24px;padding-top:24px;border-top:2px solid var(--border-solid);">' +
          '<h1 class="mb-16" style="color:var(--brand-deep);">Guida Amministratore</h1>' +
        '</div>';

      html +=
        '<div class="card">' +
          '<h2>Struttura del pannello Admin</h2>' +
          '<ul class="guide-list">' +
            '<li><strong>Fornitori</strong>: anagrafica fornitori (nome, contatti, indirizzo) + catalogo prodotti per ogni fornitore.</li>' +
            '<li><strong>Prodotti</strong>: vista trasversale del catalogo (tutti i fornitori). Filtri, prezzo modificabile inline, import Excel per fornitore.</li>' +
            '<li><strong>Ordini</strong>: creazione, modifica e chiusura degli ordini settimanali. Selezione prodotti per ciascun ordine.</li>' +
            '<li><strong>Cassa</strong>: registra i bonifici e visualizza lo storico movimenti di ogni socio (modificabile).</li>' +
            '<li><strong>Soci</strong>: gestione anagrafica soci con filtro per nome.</li>' +
          '</ul>' +
        '</div>';

      html +=
        '<div class="card">' +
          '<h2>Flusso settimanale</h2>' +
          '<div class="guide-steps">' +
            '<div class="guide-step">' +
              '<div class="guide-num">1</div>' +
              '<div><strong>Verifica il catalogo del fornitore</strong><br>' +
                '<span class="text-muted text-sm">Admin → <strong>Fornitori</strong>: espandi il fornitore e controlla che il catalogo sia aggiornato. ' +
                'Per aggiornare massicciamente puoi usare Admin → <strong>Prodotti</strong> → "Sostituisci catalogo da Excel".</span></div>' +
            '</div>' +
            '<div class="guide-step">' +
              '<div class="guide-num">2</div>' +
              '<div><strong>Crea l\'ordine</strong><br>' +
                '<span class="text-muted text-sm">Admin → <strong>Ordini</strong> → "+ Nuovo ordine". Inserisci titolo, seleziona il <strong>fornitore</strong> (obbligatorio), data chiusura e data ritiro. ' +
                'I prodotti attivi del catalogo del fornitore vengono <strong>caricati automaticamente</strong>.</span></div>' +
            '</div>' +
            '<div class="guide-step">' +
              '<div class="guide-num">3</div>' +
              '<div><strong>Scegli quali prodotti includere</strong><br>' +
                '<span class="text-muted text-sm">Nel pannello dell\'ordine vedi la sezione <strong>Prodotti dell\'ordine</strong>: checkbox pre-selezionate per ogni prodotto del catalogo. ' +
                'Togli la spunta a quelli che non vuoi offrire questa settimana e clicca "Salva selezione prodotti". ' +
                'Puoi anche usare "Seleziona tutti" / "Deseleziona tutti".</span></div>' +
            '</div>' +
            '<div class="guide-step">' +
              '<div class="guide-num">4</div>' +
              '<div><strong>Aspetta gli ordini dei soci</strong><br>' +
                '<span class="text-muted text-sm">Puoi monitorare in tempo reale il riepilogo (per prodotto / per socio) in fondo al pannello dell\'ordine.</span></div>' +
            '</div>' +
            '<div class="guide-step">' +
              '<div class="guide-num">5</div>' +
              '<div><strong>Invia il riepilogo al fornitore</strong><br>' +
                '<span class="text-muted text-sm">Riepilogo → "Per prodotto" → "Copia tabella". Incolla in WhatsApp/email/Sheets.</span></div>' +
            '</div>' +
            '<div class="guide-step">' +
              '<div class="guide-num">6</div>' +
              '<div><strong>Chiudi l\'ordine</strong><br>' +
                '<span class="text-muted text-sm">"Chiudi ordine" blocca le modifiche e <strong>genera gli addebiti automatici</strong> sul saldo di ogni socio. ' +
                'Gli ordini chiusi non sono più modificabili: eventuali correzioni si fanno in <strong>Cassa</strong>.</span></div>' +
            '</div>' +
          '</div>' +
        '</div>';

      html +=
        '<div class="card">' +
          '<h2>Gestione Fornitori</h2>' +
          '<ul class="guide-list">' +
            '<li>Admin → <strong>Fornitori</strong> → filtro per nome in alto.</li>' +
            '<li>Espandi una card per modificare nome, macro-categoria, contatti, indirizzo, note, attivo/disattivo.</li>' +
            '<li>Sotto l\'anagrafica vedi il <strong>catalogo prodotti</strong> del fornitore con prezzi.</li>' +
            '<li>Puoi eliminare un fornitore solo se non è associato a nessun ordine. Altrimenti disattivalo.</li>' +
          '</ul>' +
        '</div>';

      html +=
        '<div class="card">' +
          '<h2>Gestione Prodotti (catalogo)</h2>' +
          '<ul class="guide-list">' +
            '<li>Admin → <strong>Prodotti</strong>: vista trasversale su tutti i fornitori.</li>' +
            '<li>Filtri in alto per fornitore e categoria.</li>' +
            '<li><strong>Prezzo inline</strong>: clicca sul prezzo di un prodotto, modificalo e premi Tab per salvare.</li>' +
            '<li>Icona <strong>✎</strong>: modifica nome, varietà, formato, categoria, note, fornitore.</li>' +
            '<li>Icona <strong>×</strong>: elimina il prodotto dal catalogo (soft delete).</li>' +
            '<li><strong>Import Excel per fornitore</strong>: scarica il template pre-compilato, modificalo, ricarica. Sostituisce tutto il catalogo del fornitore scelto.</li>' +
            '<li>Colonne template: <strong>Nome</strong>, Varietà, Formato, <strong>Prezzo</strong>, Fornitore, Categoria, Note.</li>' +
          '</ul>' +
        '</div>';

      html +=
        '<div class="card">' +
          '<h2>Gestione Ordini</h2>' +
          '<ul class="guide-list">' +
            '<li>Selezione prodotti per ordine: le checkbox nel pannello <strong>"Prodotti dell\'ordine"</strong> decidono cosa vedranno i soci.</li>' +
            '<li>Quando salvi la selezione, i prodotti già ordinati dai soci sono <strong>preservati</strong> (lo stesso prodotto mantiene il suo ID).</li>' +
            '<li>Se togli la spunta a un prodotto già ordinato da qualcuno, quel prodotto scompare dal catalogo dell\'ordine: gli ordini esistenti restano ma non possono più essere modificati per quel prodotto.</li>' +
            '<li>Puoi modificare titolo, fornitore, date e note finché l\'ordine è aperto.</li>' +
            '<li>Gli ordini <strong>chiusi non sono più modificabili</strong>. Gli addebiti generati si correggono in Cassa.</li>' +
          '</ul>' +
        '</div>';

      html +=
        '<div class="card">' +
          '<h2>Gestione Cassa</h2>' +
          '<ul class="guide-list">' +
            '<li>Admin → <strong>Cassa</strong> per registrare bonifici e vedere i saldi.</li>' +
            '<li>Registra un bonifico: seleziona socio, importo, data, nota facoltativa, "Registra bonifico". Il saldo si aggiorna subito.</li>' +
            '<li>La tabella saldi elenca tutti i soci: clicca su un socio per espandere lo <strong>storico movimenti</strong> (bonifici, addebiti, rettifiche).</li>' +
            '<li>Per ogni movimento puoi <strong>modificare</strong> data/importo/nota (icona matita) o <strong>cancellarlo</strong> (icona ×).</li>' +
            '<li>Modificare un addebito <code>order_charge</code> è ammesso ma richiede conferma rafforzata: usa solo per correggere errori.</li>' +
          '</ul>' +
        '</div>';

      html +=
        '<div class="card">' +
          '<h2>Gestione Soci</h2>' +
          '<ul class="guide-list">' +
            '<li>Admin → <strong>Soci</strong> per aggiungere nuovi soci o disattivare chi non partecipa più.</li>' +
            '<li>Filtro per nome o email in alto.</li>' +
            '<li>Serve la <strong>email Google</strong> del socio (quella con cui farà login).</li>' +
            '<li>Ruolo: <code>admin</code>, <code>attivo</code>, <code>socio</code>. Gli ordini con accesso "Solo attivi" sono invisibili ai <code>socio</code>.</li>' +
            '<li>Disattivare un socio non cancella i dati: può essere riattivato in futuro.</li>' +
          '</ul>' +
        '</div>';

      html +=
        '<div class="card">' +
          '<h2>Il tuo ordine personale</h2>' +
          '<ul class="guide-list">' +
            '<li>Come admin puoi anche ordinare: tab <strong>Ordini</strong> (icona carrello) → Aperti, come un socio normale.</li>' +
            '<li>Il pannello Admin è un tab separato e non interferisce con il tuo ordine.</li>' +
          '</ul>' +
        '</div>';
    }

    PM.html('guide-content', html);
  }
};
</script>
