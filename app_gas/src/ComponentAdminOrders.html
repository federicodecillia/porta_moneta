<script>
/* ───────────────────────────────────────────
   ComponentAdminOrders — Gestione ordini (ex-cicli)
   Selettore ordine, create, edit, close, riepilogo
   ─────────────────────────────────────────── */

PM.components.adminOrders = {

  state: {
    cycles: [],
    suppliers: [],
    selectedCycleId: null,
    summary: null,
    showCreate: false,
    summarySubTab: 'product',
    expandedMember: null,
    productsSelection: null  // { catalog, selected_catalog_ids, supplier_id }
  },

  render: function(container) {
    PM.showLoading(container);
    var self = PM.components.adminOrders;

    Promise.all([
      PM.api('adminGetCycles'),
      PM.api('adminGetSuppliers')
    ]).then(function(r) {
      self.state.cycles = r[0];
      self.state.suppliers = r[1].filter(function(s) { return String(s.active) !== 'false'; });

      // Se non selezionato, prendi l'aperto, poi il primo
      if (!self.state.selectedCycleId && self.state.cycles.length) {
        var open = null;
        self.state.cycles.forEach(function(c) { if (!open && c.status === 'open') open = c; });
        self.state.selectedCycleId = (open || self.state.cycles[0]).cycle_id;
      }
      self._renderAll(container);
    }).catch(function(err) {
      PM.html(container,
        '<div style="text-align:center;padding:40px 0;">' +
        '<h2>Errore di caricamento</h2>' +
        '<p class="text-muted mt-8">' + PM._esc(err.message) + '</p>' +
        '<button class="btn btn-primary mt-16" onclick="PM.components.adminOrders.render(\'admin-orders-panel\')">Riprova</button></div>');
    });
  },

  _renderAll: function(container) {
    var self = PM.components.adminOrders;
    var st = self.state;

    var selectedCycle = null;
    st.cycles.forEach(function(c) { if (c.cycle_id === st.selectedCycleId) selectedCycle = c; });

    var html =
      '<div style="display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-3);flex-wrap:wrap;">' +
        '<h2 style="margin:0;flex:1;">Ordini</h2>' +
        '<button class="btn btn-primary btn-sm" onclick="PM.components.adminOrders.toggleCreate()">' +
          (st.showCreate ? 'Annulla' : '+ Nuovo ordine') +
        '</button>' +
      '</div>';

    // Form nuovo ordine
    if (st.showCreate) {
      html += self._renderCreateForm();
    }

    // Selettore ordine
    if (!st.cycles.length) {
      html += '<div class="card"><div class="text-muted text-sm">Nessun ordine ancora. Creane uno nuovo.</div></div>';
      PM.html(container, html);
      return;
    }

    var cycleOpts = st.cycles.map(function(c) {
      var label = c.title + ' · ' + c.supplier_name +
        (c.pickup_date ? ' · ritiro ' + PM.formatDate(c.pickup_date) : '') +
        ' · ' + c.status;
      return '<option value="' + PM._esc(c.cycle_id) + '"' +
        (c.cycle_id === st.selectedCycleId ? ' selected' : '') + '>' + PM._esc(label) + '</option>';
    }).join('');

    html +=
      '<div class="card" style="margin-bottom:var(--sp-3);">' +
        '<div class="form-group" style="margin-bottom:0;">' +
          '<label class="form-label">Ordine</label>' +
          '<select class="form-select" onchange="PM.components.adminOrders.selectCycle(this.value)">' + cycleOpts + '</select>' +
        '</div>' +
      '</div>';

    if (selectedCycle) {
      html += self._renderEditPanel(selectedCycle);
      html += '<div id="orders-products-wrap"></div>';
      html += '<div id="orders-summary-wrap"></div>';
    }

    PM.html(container, html);

    if (selectedCycle) {
      self._loadProductsSelection(selectedCycle);
      self._loadSummary(selectedCycle.cycle_id);
    }
  },

  _renderCreateForm: function() {
    var self = PM.components.adminOrders;
    var supOpts = '<option value="">— Seleziona —</option>' + self.state.suppliers.map(function(s) {
      return '<option value="' + PM._esc(s.supplier_id) + '">' + PM._esc(s.name) + '</option>';
    }).join('');

    return (
      '<div class="card" style="margin-bottom:var(--sp-3);">' +
        '<h3 class="mb-8">Nuovo ordine</h3>' +
        '<div class="form-group">' +
          '<label class="form-label">Titolo *</label>' +
          '<input class="form-input" id="cyc-title" placeholder="Es. Ordine settimanale 12/05">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Fornitore *</label>' +
          '<select class="form-select" id="cyc-supplier">' + supOpts + '</select>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-2);">' +
          '<div class="form-group">' +
            '<label class="form-label">Data chiusura *</label>' +
            '<input class="form-input" id="cyc-close" type="datetime-local">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Data ritiro</label>' +
            '<input class="form-input" id="cyc-pickup" type="date">' +
          '</div>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Accesso</label>' +
          '<select class="form-select" id="cyc-access">' +
            '<option value="attivi">Solo attivi e admin</option>' +
            '<option value="all">Tutti (soci + attivi + admin)</option>' +
          '</select>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Note</label>' +
          '<textarea class="form-textarea" id="cyc-notes" rows="2"></textarea>' +
        '</div>' +
        '<button class="btn btn-primary btn-block" onclick="PM.components.adminOrders.createCycle()">Crea ordine</button>' +
      '</div>'
    );
  },

  _renderEditPanel: function(c) {
    var isClosed = c.status === 'closed' || c.status === 'archived';
    var self = PM.components.adminOrders;

    var supOpts = self.state.suppliers.map(function(s) {
      return '<option value="' + PM._esc(s.supplier_id) + '"' +
        (s.supplier_id === c.supplier_id ? ' selected' : '') + '>' + PM._esc(s.name) + '</option>';
    }).join('');
    if (c.supplier_id && !self.state.suppliers.some(function(s) { return s.supplier_id === c.supplier_id; })) {
      supOpts = '<option value="' + PM._esc(c.supplier_id) + '" selected>' + PM._esc(c.supplier_name || '—') + '</option>' + supOpts;
    }

    var closeAt = c.order_close_at ? String(c.order_close_at).substring(0, 16) : '';
    var pickup  = c.pickup_date ? String(c.pickup_date).substring(0, 10) : '';
    var disabled = isClosed ? 'disabled' : '';

    var actionsHtml = '';
    if (!isClosed) {
      actionsHtml =
        '<button class="btn btn-primary btn-sm" onclick="PM.components.adminOrders.saveEdit(\'' + PM._esc(c.cycle_id) + '\')">Salva modifiche</button>' +
        '<button class="btn btn-outline btn-sm" onclick="PM.components.adminOrders.closeCycle(\'' + PM._esc(c.cycle_id) + '\')">Chiudi ordine</button>';
    } else {
      actionsHtml = '<span class="badge badge-closed">Ordine chiuso — per correggere i movimenti vai in Cassa</span>';
    }

    return (
      '<div class="card" style="margin-bottom:var(--sp-3);">' +
        '<div class="flex-between mb-8">' +
          '<h3 style="margin:0;">' + PM._esc(c.title) + '</h3>' +
          '<span class="badge ' + (c.status === 'open' ? 'badge-open' : 'badge-closed') + '">' + PM._esc(c.status) + '</span>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Titolo</label>' +
          '<input class="form-input" id="ed-title" value="' + PM._esc(c.title) + '" ' + disabled + '>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Fornitore</label>' +
          '<select class="form-select" id="ed-supplier" ' + disabled + '>' + supOpts + '</select>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-2);">' +
          '<div class="form-group">' +
            '<label class="form-label">Data chiusura</label>' +
            '<input class="form-input" id="ed-close" type="datetime-local" value="' + PM._esc(closeAt) + '" ' + disabled + '>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Data ritiro</label>' +
            '<input class="form-input" id="ed-pickup" type="date" value="' + PM._esc(pickup) + '" ' + disabled + '>' +
          '</div>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Accesso</label>' +
          '<select class="form-select" id="ed-access" ' + disabled + '>' +
            '<option value="attivi"' + (c.access_level === 'attivi' ? ' selected' : '') + '>Solo attivi e admin</option>' +
            '<option value="all"' + (c.access_level === 'all' ? ' selected' : '') + '>Tutti</option>' +
          '</select>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Note</label>' +
          '<textarea class="form-textarea" id="ed-notes" rows="2" ' + disabled + '>' + PM._esc(c.notes || '') + '</textarea>' +
        '</div>' +
        '<div style="display:flex;gap:var(--sp-2);flex-wrap:wrap;">' + actionsHtml + '</div>' +
      '</div>'
    );
  },

  /* ── Azioni ── */

  toggleCreate: function() {
    var st = PM.components.adminOrders.state;
    st.showCreate = !st.showCreate;
    PM.components.adminOrders._renderAll('admin-orders-panel');
  },

  createCycle: function() {
    var v = function(id) { var e = document.getElementById(id); return e ? (e.value || '').trim() : ''; };
    var payload = {
      title:          v('cyc-title'),
      supplier_id:    v('cyc-supplier'),
      order_close_at: v('cyc-close'),
      pickup_date:    v('cyc-pickup'),
      access_level:   v('cyc-access') || 'attivi',
      notes:          v('cyc-notes')
    };
    if (!payload.title) { PM.toast('Inserisci il titolo', 'error'); return; }
    if (!payload.supplier_id) { PM.toast('Seleziona il fornitore', 'error'); return; }
    if (!payload.order_close_at) { PM.toast('Inserisci la data di chiusura', 'error'); return; }

    PM.api('adminCreateCycle', payload)
      .then(function(cycle) {
        PM.toast('Ordine creato');
        PM.components.adminOrders.state.showCreate = false;
        PM.components.adminOrders.state.selectedCycleId = cycle.cycle_id;
        PM.components.adminOrders.render('admin-orders-panel');
      })
      .catch(function(err) { PM.toast(err.message, 'error'); });
  },

  selectCycle: function(cycleId) {
    var st = PM.components.adminOrders.state;
    st.selectedCycleId = cycleId;
    st.summary = null;
    st.expandedMember = null;
    PM.components.adminOrders._renderAll('admin-orders-panel');
  },

  saveEdit: function(cycleId) {
    var v = function(id) { var e = document.getElementById(id); return e ? (e.value || '').trim() : ''; };
    var payload = {
      cycle_id:       cycleId,
      title:          v('ed-title'),
      supplier_id:    v('ed-supplier'),
      order_close_at: v('ed-close'),
      pickup_date:    v('ed-pickup'),
      access_level:   v('ed-access'),
      notes:          v('ed-notes')
    };
    PM.api('adminUpdateCycle', payload)
      .then(function() {
        PM.toast('Ordine aggiornato');
        PM.components.adminOrders.render('admin-orders-panel');
      })
      .catch(function(err) { PM.toast(err.message, 'error'); });
  },

  _loadProductsSelection: function(cycle) {
    var self = PM.components.adminOrders;
    var wrap = document.getElementById('orders-products-wrap');
    if (!wrap) return;
    var isClosed = cycle.status === 'closed' || cycle.status === 'archived';

    if (!cycle.supplier_id) {
      wrap.innerHTML = '<div class="card"><div class="text-muted text-sm">Nessun fornitore associato: imposta il fornitore e salva per gestire i prodotti.</div></div>';
      return;
    }

    wrap.innerHTML = '<div class="card"><div class="text-muted text-sm">Caricamento prodotti...</div></div>';

    PM.api('adminGetCycleCatalogSelection', { cycle_id: cycle.cycle_id })
      .then(function(sel) {
        self.state.productsSelection = sel;
        self._renderProductsSelection(isClosed);
      })
      .catch(function(err) {
        wrap.innerHTML = '<div class="card"><div class="text-muted text-sm">Errore prodotti: ' + PM._esc(err.message) + '</div></div>';
      });
  },

  _renderProductsSelection: function(isClosed) {
    var self = PM.components.adminOrders;
    var sel = self.state.productsSelection;
    var wrap = document.getElementById('orders-products-wrap');
    if (!wrap || !sel) return;

    if (!sel.catalog.length) {
      wrap.innerHTML =
        '<div class="card" style="margin-bottom:var(--sp-3);">' +
          '<h3 class="mb-8">Prodotti dell\'ordine</h3>' +
          '<div class="text-muted text-sm">Il catalogo di questo fornitore è vuoto. Aggiungi prodotti dal tab Fornitori o Prodotti.</div>' +
        '</div>';
      return;
    }

    var selectedSet = {};
    sel.selected_catalog_ids.forEach(function(id) { selectedSet[id] = true; });

    var groups = {};
    var groupKeys = [];
    sel.catalog.forEach(function(p) {
      var g = p.category || 'Altro';
      if (!groups[g]) { groups[g] = []; groupKeys.push(g); }
      groups[g].push(p);
    });

    var selCount = sel.selected_catalog_ids.length;
    var totCount = sel.catalog.length;
    var disabled = isClosed ? 'disabled' : '';

    var html =
      '<div class="card" style="margin-bottom:var(--sp-3);">' +
        '<div class="flex-between mb-8">' +
          '<h3 style="margin:0;">Prodotti dell\'ordine</h3>' +
          '<span class="text-muted text-sm"><strong id="prod-sel-count">' + selCount + '</strong> / ' + totCount + ' selezionati</span>' +
        '</div>';

    if (!isClosed) {
      html +=
        '<div style="display:flex;gap:var(--sp-2);flex-wrap:wrap;margin-bottom:var(--sp-2);">' +
          '<button class="btn btn-outline btn-sm" onclick="PM.components.adminOrders.toggleAllProducts(true)">Seleziona tutti</button>' +
          '<button class="btn btn-outline btn-sm" onclick="PM.components.adminOrders.toggleAllProducts(false)">Deseleziona tutti</button>' +
        '</div>';
    }

    groupKeys.forEach(function(g) {
      html += '<div class="category-header" style="margin-top:var(--sp-2);">' + PM._esc(g) + '</div>';
      groups[g].forEach(function(p) {
        var checked = selectedSet[p.catalog_id] ? 'checked' : '';
        var meta = [p.variant, p.format, PM.formatCurrency(p.unit_price)]
          .filter(function(x) { return x; }).join(' · ');
        html +=
          '<label style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-subtle,#f0f0f0);cursor:' + (isClosed ? 'default' : 'pointer') + ';">' +
            '<input type="checkbox" class="prod-check" data-cid="' + PM._esc(p.catalog_id) + '" ' + checked + ' ' + disabled +
              ' onchange="PM.components.adminOrders._onProductCheck()">' +
            '<span style="flex:1;">' +
              '<span style="font-weight:500;">' + PM._esc(p.name) + '</span>' +
              (meta ? ' <span class="text-muted text-sm">' + PM._esc(meta) + '</span>' : '') +
            '</span>' +
          '</label>';
      });
    });

    if (!isClosed) {
      html +=
        '<button class="btn btn-primary btn-block mt-16" onclick="PM.components.adminOrders.saveProductsSelection()">' +
          'Salva selezione prodotti' +
        '</button>';
    }

    html += '</div>';
    wrap.innerHTML = html;
  },

  _onProductCheck: function() {
    var boxes = document.querySelectorAll('.prod-check');
    var count = 0;
    for (var i = 0; i < boxes.length; i++) if (boxes[i].checked) count++;
    var el = document.getElementById('prod-sel-count');
    if (el) el.textContent = count;
  },

  toggleAllProducts: function(checked) {
    var boxes = document.querySelectorAll('.prod-check');
    for (var i = 0; i < boxes.length; i++) boxes[i].checked = checked;
    PM.components.adminOrders._onProductCheck();
  },

  saveProductsSelection: function() {
    var self = PM.components.adminOrders;
    var sel = self.state.productsSelection;
    if (!sel) return;
    var boxes = document.querySelectorAll('.prod-check');
    var ids = [];
    for (var i = 0; i < boxes.length; i++) {
      if (boxes[i].checked) ids.push(boxes[i].dataset.cid);
    }
    PM.api('adminSetCycleCatalogSelection', {
      cycle_id: sel.cycle_id, catalog_ids: ids
    }).then(function(res) {
      PM.toast(res.count + ' prodotti salvati');
      var cycle = null;
      self.state.cycles.forEach(function(c) { if (c.cycle_id === sel.cycle_id) cycle = c; });
      if (cycle) self._loadProductsSelection(cycle);
    }).catch(function(err) { PM.toast(err.message, 'error'); });
  },

  closeCycle: function(cycleId) {
    PM.confirm('Chiudere l\'ordine?',
      'La chiusura genera gli addebiti automatici per ogni socio. Non potrai più modificare l\'ordine.')
      .then(function(ok) {
        if (!ok) return;
        PM.api('adminCloseCycle', { cycle_id: cycleId })
          .then(function(res) {
            PM.toast('Ordine chiuso, ' + res.charges_generated + ' addebiti generati');
            PM.components.adminOrders.render('admin-orders-panel');
          })
          .catch(function(err) { PM.toast(err.message, 'error'); });
      });
  },

  /* ── Riepilogo ── */

  _loadSummary: function(cycleId) {
    var wrap = document.getElementById('orders-summary-wrap');
    if (!wrap) return;
    wrap.innerHTML = '<div class="card"><div class="text-muted text-sm">Caricamento riepilogo...</div></div>';

    PM.api('adminGetCycleSummary', { cycle_id: cycleId })
      .then(function(s) {
        PM.components.adminOrders.state.summary = s;
        PM.components.adminOrders._renderSummary();
      })
      .catch(function() {
        wrap.innerHTML = '<div class="card"><div class="text-muted text-sm">Nessun dato di riepilogo.</div></div>';
      });
  },

  _renderSummary: function() {
    var self = PM.components.adminOrders;
    var s = self.state.summary;
    var wrap = document.getElementById('orders-summary-wrap');
    if (!wrap || !s) return;

    var sub = self.state.summarySubTab;
    var html =
      '<div class="flex-between mb-8">' +
        '<h3 style="margin:0;">Riepilogo</h3>' +
        '<div><strong>' + s.order_count + '</strong> soci · <strong>' + PM.formatCurrency(s.grand_total) + '</strong></div>' +
      '</div>' +
      '<div class="admin-tabs mb-16">' +
        '<div class="admin-tab' + (sub === 'product' ? ' active' : '') + '" onclick="PM.components.adminOrders.switchSub(\'product\')">Per prodotto</div>' +
        '<div class="admin-tab' + (sub === 'member'  ? ' active' : '') + '" onclick="PM.components.adminOrders.switchSub(\'member\')">Per socio</div>' +
      '</div>';

    if (sub === 'product') {
      html += '<div class="card"><div class="table-wrap"><table><thead><tr><th>Prodotto</th><th class="text-right">Qtà</th><th class="text-right">Totale</th></tr></thead><tbody>';
      s.by_product.forEach(function(p) {
        var name = p.name + (p.variant ? ' ' + p.variant : '');
        html += '<tr><td>' + PM._esc(name) + ' <span class="text-muted text-sm">' + PM._esc(p.format) + '</span></td>' +
          '<td class="text-right">' + p.total_qty + '</td>' +
          '<td class="text-right">' + PM.formatCurrency(p.total_amount) + '</td></tr>';
      });
      html += '</tbody></table></div>' +
        '<button class="btn btn-outline btn-sm mt-8" onclick="PM.components.adminOrders.copyTable(\'product\')">Copia tabella</button></div>';
    } else {
      html += '<div class="card"><div class="table-wrap"><table><thead><tr><th>Socio</th><th class="text-right">Totale</th><th></th></tr></thead><tbody>';
      s.by_member.forEach(function(m) {
        var isExp = self.state.expandedMember === m.member_id;
        html += '<tr onclick="PM.components.adminOrders.toggleMember(\'' + PM._esc(m.member_id) + '\')" style="cursor:pointer;">' +
          '<td>' + PM._esc(m.full_name) + '</td>' +
          '<td class="text-right">' + PM.formatCurrency(m.total) + '</td>' +
          '<td class="text-right text-muted">' + (isExp ? '▲' : '▼') + '</td></tr>';
        if (isExp && m.lines && m.lines.length) {
          html += '<tr><td colspan="3" style="padding:0;background:var(--bg-subtle,#fafafa);">' +
            '<table style="width:100%;"><tbody>';
          m.lines.forEach(function(l) {
            html += '<tr>' +
              '<td style="padding:4px 12px;font-size:.85rem;">' + PM._esc(l.product_name) + (l.variant ? ' ' + PM._esc(l.variant) : '') + '</td>' +
              '<td class="text-right" style="padding:4px 12px;font-size:.85rem;">' + l.quantity + '</td>' +
              '<td class="text-right" style="padding:4px 12px;font-size:.85rem;">' + PM.formatCurrency(l.line_total) + '</td>' +
            '</tr>';
          });
          html += '</tbody></table></td></tr>';
        }
      });
      html += '</tbody></table></div>' +
        '<button class="btn btn-outline btn-sm mt-8" onclick="PM.components.adminOrders.copyTable(\'member\')">Copia tabella</button></div>';
    }

    wrap.innerHTML = html;
  },

  switchSub: function(tab) {
    PM.components.adminOrders.state.summarySubTab = tab;
    PM.components.adminOrders._renderSummary();
  },

  toggleMember: function(memberId) {
    var st = PM.components.adminOrders.state;
    st.expandedMember = st.expandedMember === memberId ? null : memberId;
    PM.components.adminOrders._renderSummary();
  },

  copyTable: function(type) {
    var s = PM.components.adminOrders.state.summary;
    if (!s) return;
    var text = '';
    if (type === 'product') {
      text = 'Prodotto\tFormato\tQtà\tTotale\n';
      s.by_product.forEach(function(p) {
        text += p.name + (p.variant ? ' ' + p.variant : '') + '\t' + p.format + '\t' + p.total_qty + '\t' + p.total_amount.toFixed(2) + '\n';
      });
    } else {
      text = 'Socio\tTotale\n';
      s.by_member.forEach(function(m) {
        text += m.full_name + '\t' + m.total.toFixed(2) + '\n';
      });
    }
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() { PM.toast('Tabella copiata'); });
    }
  }
};
</script>
