<script>
/* ComponentAdminOrders — Riepilogo ordini (ORDINI tab) */

PM.components.adminOrders = {

  _container: null,
  _openCycle:  null,
  _summary:    null,
  _expanded:   null,
  _subTab:     'prodotto',

  render: function(container) {
    var self = PM.components.adminOrders;
    self._container = container;
    PM.showLoading(container);

    PM.api('adminGetRecentCycles').then(function(cycles) {
      self._openCycle = null;
      (cycles || []).forEach(function(c) { if (c.status === 'open') self._openCycle = c; });

      if (!self._openCycle) {
        PM.html(container,
          '<div class="empty-state"><span class="empty-state-icon">&#128722;</span>' +
          '<h2>Nessun ciclo aperto</h2>' +
          '<p>Apri un ciclo dalla tab Ciclo per vedere gli ordini.</p></div>');
        return;
      }

      PM.api('adminGetCycleSummary', { cycle_id: self._openCycle.cycle_id })
        .then(function(s) {
          self._summary = s;
          self._renderAll();
        })
        .catch(function(err) {
          PM.html(container,
            '<div class="empty-state"><span class="empty-state-icon">&#9888;&#65039;</span>' +
            '<h2>Errore</h2><p>' + PM._esc(err.message) + '</p>' +
            '<button class="btn btn-orange mt-16" onclick="PM.components.adminOrders.render(\'admin-ordini-panel\')">Riprova</button></div>');
        });
    }).catch(function(err) {
      PM.html(container,
        '<div class="empty-state"><span class="empty-state-icon">&#9888;&#65039;</span>' +
        '<h2>Errore</h2><p>' + PM._esc(err.message) + '</p>' +
        '<button class="btn btn-orange mt-16" onclick="PM.components.adminOrders.render(\'admin-ordini-panel\')">Riprova</button></div>');
    });
  },

  _renderAll: function() {
    var self = PM.components.adminOrders;
    var s    = self._summary;
    var c    = self._openCycle;
    if (!s || !c) return;

    var html = '';

    // ── Stats bar ──
    html +=
      '<div style="font-size:15px;font-weight:800;margin-bottom:4px;">' + PM._esc(c.title) + '</div>' +
      '<div style="font-family:var(--mono);font-size:10px;color:var(--gray-l);margin-bottom:16px;">' +
        'Chiude ' + PM.formatDateTime(c.order_close_at) +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;">' +
        '<div class="stat-chip">' +
          '<div class="stat-chip-label">Totale raccolta</div>' +
          '<div class="stat-chip-value">' + PM.formatEur(s.grand_total) + '</div>' +
        '</div>' +
        '<div class="stat-chip">' +
          '<div class="stat-chip-label">Partecipanti</div>' +
          '<div class="stat-chip-value">' + s.order_count + '</div>' +
        '</div>' +
      '</div>';

    // ── Sub-tabs ──
    html +=
      '<div class="seg-tabs" style="margin-bottom:16px;">' +
        '<button class="seg-tab ' + (self._subTab === 'prodotto' ? 'active' : 'inactive') + '" onclick="PM.components.adminOrders._switchSub(\'prodotto\')">Per prodotto</button>' +
        '<button class="seg-tab ' + (self._subTab === 'socio'    ? 'active' : 'inactive') + '" onclick="PM.components.adminOrders._switchSub(\'socio\')">Per socio</button>' +
      '</div>';

    if (self._subTab === 'prodotto') {
      html += '<div class="card" style="padding:0;">';
      if (!s.by_product.length) {
        html += '<div style="padding:20px;color:var(--gray-l);font-size:13px;">Nessun ordine ancora.</div>';
      } else {
        html += '<div class="table-wrap"><table><thead><tr><th>Prodotto</th><th class="text-right">Qtà</th><th class="text-right">Totale</th></tr></thead><tbody>';
        s.by_product.forEach(function(p) {
          var name = p.name + (p.variant ? ' ' + p.variant : '');
          html += '<tr><td>' + PM._esc(name) + '</td><td class="text-right">' + p.total_qty + '</td><td class="text-right" style="font-family:var(--mono);font-weight:600;">' + PM.formatEur(p.total_amount) + '</td></tr>';
        });
        html += '</tbody></table></div>';
      }
      html += '<div style="padding:12px 16px;border-top:1px solid var(--border);">' +
        '<button class="btn btn-ghost" onclick="PM.components.adminOrders._copyTable()">Copia tabella</button>' +
        '</div></div>';

    } else {
      // Per socio — expandable
      if (!s.by_member.length) {
        html += '<div class="card card-body" style="color:var(--gray-l);font-size:13px;">Nessun ordine ancora.</div>';
      } else {
        s.by_member.forEach(function(m) {
          var isExp = self._expanded === m.member_id;
          html +=
            '<div class="card" style="overflow:hidden;margin-bottom:8px;">' +
              '<div class="flex-between" style="padding:14px 16px;cursor:pointer;" onclick="PM.components.adminOrders._toggleMember(\'' + PM._esc(m.member_id) + '\')">' +
                '<div>' +
                  '<div style="font-size:14px;font-weight:600;">' + PM._esc(m.full_name) + '</div>' +
                  '<div style="font-family:var(--mono);font-size:11px;color:var(--gray);margin-top:2px;">' +
                    m.lines.length + ' prodott' + (m.lines.length === 1 ? 'o' : 'i') +
                  '</div>' +
                '</div>' +
                '<div style="display:flex;align-items:center;gap:8px;">' +
                  '<div style="font-family:var(--mono);font-size:14px;font-weight:700;">' + PM.formatEur(m.total) + '</div>' +
                  '<span class="badge badge-teal-l">Ordinato</span>' +
                  '<span style="color:var(--gray-l);font-size:16px;">' + (isExp ? '▲' : '▼') + '</span>' +
                '</div>' +
              '</div>';

          if (isExp) {
            html += '<div style="border-top:1px solid var(--border);padding:0 16px;">';
            m.lines.forEach(function(l) {
              html +=
                '<div class="flex-between" style="padding:10px 0;border-bottom:1px solid var(--border);">' +
                  '<div style="font-size:13px;">' + PM._esc(l.product_name + (l.variant ? ' ' + l.variant : '')) + ' ×' + l.quantity + '</div>' +
                  '<div style="font-family:var(--mono);font-size:13px;font-weight:600;">' + PM.formatEur(l.line_total) + '</div>' +
                '</div>';
            });
            html += '</div>';
          }
          html += '</div>';
        });
      }
    }

    PM.html(self._container, html);
  },

  _switchSub: function(tab) {
    var self = PM.components.adminOrders;
    self._subTab  = tab;
    self._expanded = null;
    self._renderAll();
  },

  _toggleMember: function(memberId) {
    var self = PM.components.adminOrders;
    self._expanded = self._expanded === memberId ? null : memberId;
    self._renderAll();
  },

  _copyTable: function() {
    var self = PM.components.adminOrders;
    var s    = self._summary;
    if (!s) return;
    var text = 'Prodotto\tQtà\tTotale\n';
    s.by_product.forEach(function(p) {
      text += (p.name + (p.variant ? ' ' + p.variant : '')) + '\t' + p.total_qty + '\t' + p.total_amount.toFixed(2) + '\n';
    });
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() { PM.toast('Tabella copiata'); });
    }
  }
};
</script>
