<script>
/* ComponentAdminCycle — Gestione ciclo (CICLO tab) */

PM.components.adminCycle = {

  _container: null,
  _suppliers: [],
  _openCycle: null,
  _summary: null,

  render: function(container) {
    var self = PM.components.adminCycle;
    self._container = container;
    PM.showLoading(container);

    Promise.all([
      PM.api('adminGetRecentCycles'),
      PM.api('adminGetSuppliers')
    ]).then(function(results) {
      var cycles = results[0] || [];
      self._suppliers = (results[1] || []).filter(function(s) { return String(s.active) !== 'false'; });

      self._openCycle = null;
      cycles.forEach(function(c) { if (c.status === 'open') self._openCycle = c; });

      if (self._openCycle) {
        PM.api('adminGetCycleSummary', { cycle_id: self._openCycle.cycle_id })
          .then(function(s) {
            self._summary = s;
            self._renderAll();
          })
          .catch(function() {
            self._summary = null;
            self._renderAll();
          });
      } else {
        self._summary = null;
        self._renderAll();
      }
    }).catch(function(err) {
      PM.html(container,
        '<div class="empty-state"><span class="empty-state-icon">&#9888;&#65039;</span>' +
        '<h2>Errore di caricamento</h2><p>' + PM._esc(err.message) + '</p>' +
        '<button class="btn btn-orange mt-16" onclick="PM.components.adminCycle.render(\'admin-ciclo-panel\')">Riprova</button></div>');
    });
  },

  _renderAll: function() {
    var self = PM.components.adminCycle;
    var c    = self._openCycle;
    var s    = self._summary;
    var html = '';

    if (c) {
      // ── Open cycle stats ──
      html +=
        '<div style="margin-bottom:16px;">' +
          '<div style="font-size:16px;font-weight:800;margin-bottom:4px;letter-spacing:-0.02em;">' + PM._esc(c.title) + '</div>' +
          '<div style="font-family:var(--mono);font-size:10px;color:var(--gray-l);">' +
            PM.formatDateTime(c.order_close_at) +
            (c.pickup_date ? ' · Ritiro ' + PM.formatDate(c.pickup_date) : '') +
          '</div>' +
        '</div>';

      if (s) {
        html +=
          '<div class="card" style="padding:0;overflow:hidden;margin-bottom:16px;">' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;">' +
              '<div class="stat-chip" style="border-radius:0;border-right:1px solid var(--border);">' +
                '<div class="stat-chip-label">Soci che hanno ordinato</div>' +
                '<div class="stat-chip-value">' + s.order_count + '</div>' +
              '</div>' +
              '<div class="stat-chip" style="border-radius:0;">' +
                '<div class="stat-chip-label">Valore totale ordini</div>' +
                '<div class="stat-chip-value">' + PM.formatEur(s.grand_total) + '</div>' +
              '</div>' +
            '</div>' +
          '</div>';
      }

      html +=
        '<button class="btn btn-red btn-block mb-12" onclick="PM.components.adminCycle.closeCycle(\'' + PM._esc(c.cycle_id) + '\')">Chiudi ciclo</button>';

    } else {
      // ── No open cycle — show create form ──
      html +=
        '<div style="font-size:16px;font-weight:800;margin-bottom:16px;letter-spacing:-0.02em;">Apri nuovo ciclo</div>';

      var supOpts = '<option value="">— Seleziona fornitore —</option>';
      self._suppliers.forEach(function(s) {
        supOpts += '<option value="' + PM._esc(s.supplier_id) + '">' + PM._esc(s.name) + '</option>';
      });

      html +=
        '<div class="card card-body">' +
          '<div class="form-group">' +
            '<label class="form-label">Nome ciclo *</label>' +
            '<input class="form-input" id="cyc-title" placeholder="Es. Ordine settimana 12/05">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Fornitore *</label>' +
            '<select class="form-select" id="cyc-supplier">' + supOpts + '</select>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Data chiusura ordini *</label>' +
            '<input class="form-input" id="cyc-close" type="datetime-local">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Data ritiro</label>' +
            '<input class="form-input" id="cyc-pickup" type="date">' +
          '</div>' +
          '<button class="btn btn-teal btn-block" onclick="PM.components.adminCycle.createCycle()">Apri nuovo ciclo</button>' +
        '</div>';
    }

    PM.html(self._container, html);
  },

  closeCycle: function(cycleId) {
    var self = PM.components.adminCycle;
    PM.confirm('Chiudere il ciclo?',
      'La chiusura genera gli addebiti automatici per ogni socio. Non potrai più modificare gli ordini.')
      .then(function(ok) {
        if (!ok) return;
        PM.api('adminCloseCycle', { cycle_id: cycleId })
          .then(function(res) {
            PM.toast('Ciclo chiuso · ' + res.charges_generated + ' addebiti generati');
            PM.components.adminCycle.render('admin-ciclo-panel');
          })
          .catch(function(err) { PM.toast(err.message, 'error'); });
      });
  },

  createCycle: function() {
    var v = function(id) {
      var e = document.getElementById(id);
      return e ? (e.value || '').trim() : '';
    };
    var payload = {
      title:          v('cyc-title'),
      supplier_id:    v('cyc-supplier'),
      order_close_at: v('cyc-close'),
      pickup_date:    v('cyc-pickup'),
      access_level:   'attivi'
    };

    if (!payload.title)          { PM.toast('Inserisci il nome del ciclo', 'error'); return; }
    if (!payload.supplier_id)    { PM.toast('Seleziona il fornitore', 'error'); return; }
    if (!payload.order_close_at) { PM.toast('Inserisci la data di chiusura', 'error'); return; }

    PM.api('adminCreateCycle', payload)
      .then(function(cycle) {
        var msg = 'Ciclo aperto';
        if (cycle.products_loaded) msg += ' · ' + cycle.products_loaded + ' prodotti caricati';
        PM.toast(msg);
        PM.components.adminCycle.render('admin-ciclo-panel');
      })
      .catch(function(err) { PM.toast(err.message, 'error'); });
  }
};
</script>
