<script>
/* AppAdmin — Admin panel orchestrator */

PM.components.admin = {

  currentTab: 'ciclo',
  _initialized: false,

  load: function() {
    var self = PM.components.admin;

    if (!PM.state.session || PM.state.session.role !== 'admin') {
      var wrap = document.getElementById('admin-content-wrap');
      if (wrap) wrap.innerHTML =
        '<div class="empty-state" style="padding-top:80px;">' +
        '<span class="empty-state-icon">&#128274;</span>' +
        '<h2>Accesso riservato</h2>' +
        '<p>Questa sezione è riservata agli amministratori.</p>' +
        '</div>';
      return;
    }

    var wrap = document.getElementById('admin-content-wrap');
    if (!wrap) return;

    if (!self._initialized) {
      wrap.innerHTML =
        '<div class="admin-header">' +
          '<div class="flex-between" style="margin-bottom:12px;">' +
            '<img src="' + PM.LOGO_SRC + '" alt="Porta Moneta" style="height:22px;">' +
            '<span class="badge badge-orange">Admin</span>' +
          '</div>' +
          '<div class="admin-tabs-bar" id="admin-tabs-bar">' +
            '<button class="admin-tab active" data-atab="ciclo"    onclick="PM.components.admin.switchTab(\'ciclo\')">Ciclo</button>' +
            '<button class="admin-tab"        data-atab="prodotti" onclick="PM.components.admin.switchTab(\'prodotti\')">Prodotti</button>' +
            '<button class="admin-tab"        data-atab="ordini"   onclick="PM.components.admin.switchTab(\'ordini\')">Ordini</button>' +
            '<button class="admin-tab"        data-atab="cassa"    onclick="PM.components.admin.switchTab(\'cassa\')">Cassa</button>' +
            '<button class="admin-tab"        data-atab="soci"     onclick="PM.components.admin.switchTab(\'soci\')">Soci</button>' +
          '</div>' +
        '</div>' +
        '<div id="admin-ciclo-panel"    class="admin-panel active"></div>' +
        '<div id="admin-prodotti-panel" class="admin-panel"></div>' +
        '<div id="admin-ordini-panel"   class="admin-panel"></div>' +
        '<div id="admin-cassa-panel"    class="admin-panel"></div>' +
        '<div id="admin-soci-panel"     class="admin-panel"></div>';

      self._initialized = true;
    }

    self.switchTab(self.currentTab);
  },

  switchTab: function(tab) {
    var self = PM.components.admin;
    self.currentTab = tab;

    var tabs = document.querySelectorAll('#admin-tabs-bar .admin-tab');
    for (var i = 0; i < tabs.length; i++) {
      var t = tabs[i];
      t.className = 'admin-tab' + (t.dataset.atab === tab ? ' active' : '');
    }

    var panels = ['ciclo', 'prodotti', 'ordini', 'cassa', 'soci'];
    panels.forEach(function(p) {
      var el = document.getElementById('admin-' + p + '-panel');
      if (el) el.className = 'admin-panel' + (p === tab ? ' active' : '');
    });

    var containerId = 'admin-' + tab + '-panel';
    var comp = {
      ciclo:    PM.components.adminCycle,
      prodotti: PM.components.adminProducts,
      ordini:   PM.components.adminOrders,
      cassa:    PM.components.adminLedger,
      soci:     PM.components.adminMembers
    }[tab];

    if (comp && comp.render) comp.render(containerId);
  }
};
</script>
