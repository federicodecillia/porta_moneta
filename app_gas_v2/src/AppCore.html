  /* ── API wrapper ── */
  api: function(action, payload) {
    return new Promise(function(resolve, reject) {
      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.ok) {
            resolve(response.result);
          } else {
            var msg = (response && response.error && response.error.message) || 'Errore sconosciuto';
            reject(new Error(msg));
          }
        })
        .withFailureHandler(function(err) {
          reject(new Error(err.message || 'Errore di connessione'));
        })
        .callApi(action, payload || {});
    });
  },

  /* ── Router ── */
  navigate: function(view) {
    if (PM.state.view === view) return;
    PM.state.view = view;
    window.location.hash = view;
    PM._updateSections();
    PM._updateNav();
  },

  _updateSections: function() {
    var sections = document.querySelectorAll('.section');
    for (var i = 0; i < sections.length; i++) {
      var s = sections[i];
      if (s.id === 'sec-' + PM.state.view) {
        s.classList.add('active');
      } else {
        s.classList.remove('active');
      }
    }
  },

  _updateNav: function() {
    var views = ['home', 'ordine', 'storico', 'guida', 'admin'];
    views.forEach(function(v) {
      var item    = document.querySelector('[data-view="' + v + '"]');
      var outline = document.getElementById('nav-' + v + '-outline');
      var filled  = document.getElementById('nav-' + v + '-filled');
      var isActive = PM.state.view === v;
      if (item) {
        if (isActive) item.classList.add('active');
        else           item.classList.remove('active');
      }
      if (outline) outline.style.display = isActive ? 'none'  : 'block';
      if (filled)  filled.style.display  = isActive ? 'block' : 'none';
    });
  },

  /* ── Toast ── */
  toast: function(message, type) {
    var t = document.getElementById('toast');
    t.textContent = message;
    t.className = 'toast' + (type === 'error' ? ' toast-error' : type === 'warning' ? ' toast-warning' : '');
    void t.offsetWidth;
    t.classList.add('show');
    clearTimeout(PM._toastTimer);
    PM._toastTimer = setTimeout(function() {
      t.classList.remove('show');
    }, 3000);
  },
  _toastTimer: null,

  /* ── Confirm dialog ── */
  confirm: function(title, message) {
    return new Promise(function(resolve) {
      var overlay = document.getElementById('modal-overlay');
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-message').textContent = message;
      overlay.classList.add('show');
      document.getElementById('modal-confirm').onclick = function() {
        overlay.classList.remove('show');
        resolve(true);
      };
      document.getElementById('modal-cancel').onclick = function() {
        overlay.classList.remove('show');
        resolve(false);
      };
    });
  },

  /* ── Format helpers ── */
  formatEur: function(v) {
    return Math.abs(v || 0).toFixed(2).replace('.', ',') + ' €';
  },
  formatEurSigned: function(v) {
    var abs = Math.abs(v || 0).toFixed(2).replace('.', ',') + ' €';
    return v < 0 ? '−' + abs : (v > 0 ? '+' + abs : abs);
  },
  formatCurrency: function(v) {
    return new Intl.NumberFormat('it-IT', {
      style: 'currency', currency: 'EUR', minimumFractionDigits: 2
    }).format(v || 0);
  },
  formatDate: function(isoString) {
    if (!isoString) return '';
    var d = new Date(isoString);
    if (isNaN(d.getTime())) return String(isoString);
    return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric' });
  },
  formatDateShort: function(isoString) {
    if (!isoString) return '';
    var d = new Date(isoString);
    if (isNaN(d.getTime())) return String(isoString);
    return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short' });
  },
  formatDateTime: function(isoString) {
    if (!isoString) return '';
    var d = new Date(isoString);
    if (isNaN(d.getTime())) return String(isoString);
    return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short' }) +
      ' · ' + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  },

  /* ── Escape HTML ── */
  _esc: function(str) {
    var d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  },

  /* ── Render helper ── */
  html: function(containerId, htmlStr) {
    var el = document.getElementById(containerId);
    if (el) el.innerHTML = htmlStr;
  },

  /* ── Skeleton loading ── */
  showLoading: function(containerId) {
    PM.html(containerId,
      '<div class="skeleton-card">' +
        '<div class="skeleton skeleton-title"></div>' +
        '<div class="skeleton skeleton-text" style="width:80%;"></div>' +
        '<div class="skeleton skeleton-text" style="width:60%;"></div>' +
      '</div>' +
      '<div class="skeleton-card">' +
        '<div class="skeleton skeleton-text" style="width:90%;"></div>' +
        '<div class="skeleton skeleton-text" style="width:70%;"></div>' +
      '</div>');
  },

  /* ── Init ── */
  init: function() {
    window.addEventListener('hashchange', function() {
      var hash = window.location.hash.replace('#', '') || 'home';
      PM.state.view = hash;
      PM._updateSections();
      PM._updateNav();
      PM._onViewChange(hash);
    });

    document.querySelectorAll('.nav-item').forEach(function(item) {
      item.addEventListener('click', function() {
        var target = item.dataset.view;
        var currentHash = (window.location.hash || '').replace('#', '') || 'home';
        PM.navigate(target);
        if (currentHash === target) PM._onViewChange(target);
      });
    });

    PM._loadSession();
  },

  _loadSession: function() {
    PM.api('getCurrentSession')
      .then(function(session) {
        PM.state.session = session;
        if (session.role === 'admin') {
          var adminNav = document.getElementById('nav-admin');
          if (adminNav) adminNav.classList.remove('hidden');
        }
        PM.navigate('home');
        PM._onViewChange('home');
      })
      .catch(function(err) {
        document.getElementById('sec-loading').innerHTML =
          '<div style="padding:52px 20px;"><div class="empty-state">' +
          '<span class="empty-state-icon">&#128274;</span>' +
          '<h2>Impossibile caricare</h2>' +
          '<p class="mt-8">' + PM._esc(err.message) + '</p>' +
          '<button class="btn btn-orange mt-16" onclick="PM._loadSession()">Riprova</button>' +
          '</div></div>';
      });
  },

  _onViewChange: function(view) {
    if (view === 'home'    && PM.components.memberHome)  { PM.components.memberHome.load(); }
    else if (view === 'ordine'   && PM.components.orderForm)   { PM.components.orderForm.load(); }
    else if (view === 'storico'  && PM.components.storico)     { PM.components.storico.load(); }
    else if (view === 'guida'    && PM.components.guide)       { PM.components.guide.load(); }
    else if (view === 'admin'    && PM.components.admin)       { PM.components.admin.load(); }
  }
};

document.addEventListener('DOMContentLoaded', PM.init);
</script>
