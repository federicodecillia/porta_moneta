<script>
/* ComponentOrderForm — Form ordine con stepper (sezione #ordine) */

PM.components.orderForm = {

  draft: {},
  products: [],
  cycleId: null,
  balance: 0,
  saving: false,
  _draftCycleId: null,

  load: function() {
    var of = PM.components.orderForm;

    var wrap = document.getElementById('ordine-content-wrap');
    if (wrap) {
      wrap.innerHTML =
        '<div class="view-header">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<img src="' + PM.LOGO_SRC + '" alt="Porta Moneta" style="height:22px;">' +
          '</div>' +
          '<div style="margin-top:10px;">' +
            '<div class="skeleton skeleton-title" style="width:50%;height:16px;"></div>' +
          '</div>' +
        '</div>' +
        '<div style="flex:1;overflow-y:auto;padding:0 20px;" id="ordine-product-list">' +
          '<div class="skeleton-card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="width:80%;"></div></div>' +
          '<div class="skeleton-card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="width:70%;"></div></div>' +
        '</div>';
    }

    PM.api('getMemberDashboard')
      .then(function(data) {
        PM.state.dashboard = data;
        of.balance = data.balance;

        if (!data.cycle || data.cycle_restricted) {
          of._renderEmpty();
          return;
        }

        of.cycleId  = data.cycle.cycle_id;
        of.products = data.products || [];

        if (of._draftCycleId !== of.cycleId) {
          of.draft = {};
          (data.my_lines || []).forEach(function(line) {
            if (line.quantity > 0) of.draft[line.product_id] = line.quantity;
          });
          of._draftCycleId = of.cycleId;
        }

        of._renderHeader(data);
        of._renderProducts();
        of._updateFooter();
      })
      .catch(function(err) {
        var wrap = document.getElementById('ordine-content-wrap');
        if (wrap) wrap.innerHTML =
          '<div class="empty-state" style="padding-top:80px;">' +
          '<span class="empty-state-icon">&#9888;&#65039;</span>' +
          '<h2>Errore di caricamento</h2>' +
          '<p>' + PM._esc(err.message) + '</p>' +
          '<button class="btn btn-orange mt-16" onclick="PM.components.orderForm.load()">Riprova</button>' +
          '</div>';
      });
  },

  _renderEmpty: function() {
    var wrap = document.getElementById('ordine-content-wrap');
    if (!wrap) return;
    wrap.innerHTML =
      '<div style="padding:52px 20px 0;">' +
        '<img src="' + PM.LOGO_SRC + '" alt="Porta Moneta" style="height:22px;margin-bottom:20px;">' +
      '</div>' +
      '<div class="empty-state">' +
        '<span class="empty-state-icon">&#128722;</span>' +
        '<h2>Nessun ordine aperto</h2>' +
        '<p>Torna quando l\'ordine sarà aperto.</p>' +
      '</div>';
  },

  _renderHeader: function(data) {
    var cycle = data.cycle;
    var closeInfo = cycle.order_close_at ? PM.formatDateTime(cycle.order_close_at) : '';
    var wrap = document.getElementById('ordine-content-wrap');
    if (!wrap) return;

    var headerHtml =
      '<div class="view-header">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;">' +
          '<img src="' + PM.LOGO_SRC + '" alt="Porta Moneta" style="height:22px;">' +
          '<span class="badge badge-teal badge-dot">Aperto</span>' +
        '</div>' +
        '<div style="margin-top:10px;">' +
          '<div style="font-size:20px;font-weight:900;letter-spacing:-0.03em;color:var(--near-blk);">Il tuo ordine</div>' +
          '<div style="font-family:var(--mono);font-size:10px;color:var(--gray);margin-top:3px;">' +
            PM._esc(cycle.title) + (closeInfo ? ' · Chiude ' + closeInfo : '') +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div style="flex:1;overflow-y:auto;padding:0 20px;" id="ordine-product-list"></div>' +
      '<div class="sticky-footer" id="sticky-footer">' +
        '<div class="sticky-footer-row">' +
          '<div>' +
            '<div class="footer-total-label">Totale ordine</div>' +
            '<div class="footer-total-amount" id="footer-total">0,00 €</div>' +
          '</div>' +
          '<div>' +
            '<div class="footer-balance-label">Saldo dopo</div>' +
            '<div class="footer-balance-amount" id="footer-balance" style="color:var(--teal);">' + PM.formatEur(data.balance) + '</div>' +
          '</div>' +
        '</div>' +
        '<button class="btn btn-orange btn-block" id="btn-save-order" onclick="PM.components.orderForm.save()">Conferma ordine</button>' +
      '</div>';

    wrap.innerHTML = headerHtml;
  },

  _renderProducts: function() {
    var of = PM.components.orderForm;
    var listEl = document.getElementById('ordine-product-list');
    if (!listEl) return;

    var catOrder = ['Frutta', 'Verdura', 'Insalate'];
    var groups = {};
    var groupKeys = [];
    of.products.forEach(function(p) {
      var g = p.category || '';
      if (!groups[g]) { groups[g] = []; groupKeys.push(g); }
      groups[g].push(p);
    });
    groupKeys.sort(function(a, b) {
      var ai = catOrder.indexOf(a); if (ai === -1) ai = 99;
      var bi = catOrder.indexOf(b); if (bi === -1) bi = 99;
      return ai !== bi ? ai - bi : a.localeCompare(b);
    });

    var html = '';
    groupKeys.forEach(function(group) {
      if (group) html += '<div class="cat-label">' + PM._esc(group) + '</div>';
      groups[group].forEach(function(p) {
        var qty  = of.draft[p.product_id] || 0;
        var meta = [p.variant, p.format].filter(Boolean).join(' · ');
        var pid  = PM._esc(p.product_id);

        html +=
          '<div class="product-row" id="prow-' + pid + '">' +
            '<div style="flex:1;min-width:0;padding-right:12px;">' +
              '<div class="product-name">' + PM._esc(p.name) + '</div>' +
              '<div class="product-meta-row">' +
                (meta ? '<span class="product-unit">' + PM._esc(meta) + '</span>' : '') +
                '<span class="product-price">' + PM.formatEur(p.unit_price) + '</span>' +
              '</div>' +
            '</div>' +
            of._stepperHtml(pid, qty) +
          '</div>';
      });
    });

    if (!groupKeys.length) {
      html = '<div class="empty-state"><span class="empty-state-icon">&#128722;</span><h2>Nessun prodotto disponibile</h2></div>';
    }
    html += '<div style="height:16px;"></div>';
    listEl.innerHTML = html;
  },

  _stepperHtml: function(pid, qty) {
    if (qty === 0) {
      return (
        '<div class="stepper-wrap zero" id="stepper-' + pid + '">' +
          '<button class="stepper-btn stepper-btn-plus-zero" onclick="PM.components.orderForm.changeQty(\'' + pid + '\',1)" aria-label="Aggiungi">+</button>' +
        '</div>'
      );
    }
    return (
      '<div class="stepper-wrap has-qty" id="stepper-' + pid + '">' +
        '<button class="stepper-btn stepper-btn-minus" onclick="PM.components.orderForm.changeQty(\'' + pid + '\',-1)" aria-label="Meno">−</button>' +
        '<span class="stepper-qty" id="qty-' + pid + '">' + qty + '</span>' +
        '<button class="stepper-btn stepper-btn-plus-filled" onclick="PM.components.orderForm.changeQty(\'' + pid + '\',1)" aria-label="Più">+</button>' +
      '</div>'
    );
  },

  changeQty: function(productId, delta) {
    var of = PM.components.orderForm;
    var next = Math.max(0, (of.draft[productId] || 0) + delta);
    of.draft[productId] = next;

    var stepperEl = document.getElementById('stepper-' + productId);
    if (stepperEl) {
      stepperEl.outerHTML = of._stepperHtml(productId, next);
    }

    var qtyEl = document.getElementById('qty-' + productId);
    if (qtyEl) {
      qtyEl.classList.remove('bump');
      void qtyEl.offsetWidth;
      qtyEl.classList.add('bump');
    }

    of._updateFooter();
  },

  _updateFooter: function() {
    var of = PM.components.orderForm;
    var total = 0;
    of.products.forEach(function(p) {
      total += (of.draft[p.product_id] || 0) * p.unit_price;
    });
    total = Math.round(total * 100) / 100;

    var afterBalance = Math.round((of.balance - total) * 100) / 100;

    var footerEl  = document.getElementById('sticky-footer');
    var totalEl   = document.getElementById('footer-total');
    var balanceEl = document.getElementById('footer-balance');

    if (footerEl) footerEl.classList.toggle('visible', total > 0);
    if (totalEl)  totalEl.textContent = PM.formatEur(total);
    if (balanceEl) {
      balanceEl.textContent = PM.formatEur(Math.abs(afterBalance));
      balanceEl.style.color = afterBalance < 0 ? 'var(--red)' : 'var(--teal)';
    }
  },

  save: function() {
    var of = PM.components.orderForm;
    if (of.saving || !of.cycleId) return;

    of.saving = true;
    var btn = document.getElementById('btn-save-order');
    if (btn) { btn.disabled = true; btn.textContent = 'Salvataggio...'; }

    var lines = [];
    for (var pid in of.draft) {
      if (of.draft[pid] > 0) lines.push({ product_id: pid, quantity: of.draft[pid] });
    }

    PM.api('saveMyOrder', { cycle_id: of.cycleId, lines: lines })
      .then(function(res) {
        if (res.balance_warning) PM.toast(res.balance_warning, 'warning');
        else PM.toast('Ordine salvato ✓');
        if (btn) { btn.textContent = 'Salvato ✓'; setTimeout(function() { if (btn) btn.textContent = 'Conferma ordine'; }, 2000); }
        PM.state.dashboard = null;
      })
      .catch(function(err) {
        PM.toast(err.message, 'error');
        if (btn) btn.textContent = 'Conferma ordine';
      })
      .finally(function() {
        of.saving = false;
        if (btn) btn.disabled = false;
      });
  }
};
</script>
