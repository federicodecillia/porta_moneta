<script>
/* ComponentAdminMembers — Gestione soci */

PM.components.adminMembers = {

  _filter: '',
  _allMembers: [],
  _container: null,

  render: function(container) {
    PM.showLoading(container);
    var self = PM.components.adminMembers;
    self._container = container;

    PM.api('adminGetMembers')
      .then(function(members) {
        self._allMembers = members;
        self._renderList();
      })
      .catch(function(err) {
        PM.html(container,
          '<div class="empty-state"><span class="empty-state-icon">&#9888;&#65039;</span>' +
          '<h2>Errore</h2><p>' + PM._esc(err.message) + '</p>' +
          '<button class="btn btn-orange mt-16" onclick="PM.components.adminMembers.render(\'admin-soci-panel\')">Riprova</button></div>');
      });
  },

  onFilterInput: function(value) {
    PM.components.adminMembers._filter = value;
    PM.components.adminMembers._renderList();
  },

  _renderList: function() {
    var self = PM.components.adminMembers;
    var q    = (self._filter || '').trim().toLowerCase();
    var match = function(m) {
      if (!q) return true;
      return (m.full_name || '').toLowerCase().indexOf(q) !== -1 ||
             (m.email || '').toLowerCase().indexOf(q) !== -1;
    };

    var active   = self._allMembers.filter(function(m) { return String(m.active) !== 'false' && match(m); });
    var inactive = self._allMembers.filter(function(m) { return String(m.active) === 'false' && match(m); });

    var sortName = function(a, b) { return a.full_name.localeCompare(b.full_name); };
    var admins   = active.filter(function(m) { return m.role === 'admin'; }).sort(sortName);
    var attivi   = active.filter(function(m) { return m.role === 'attivo' || m.role === 'member'; }).sort(sortName);
    var soci     = active.filter(function(m) { return m.role === 'socio'; }).sort(sortName);

    var html = '';

    // ── Add member form ──
    html +=
      '<div style="font-size:15px;font-weight:800;margin-bottom:12px;">Aggiungi socio</div>' +
      '<div class="card card-body">' +
        '<div class="form-group">' +
          '<label class="form-label">Nome completo</label>' +
          '<input class="form-input" id="mem-name" placeholder="Mario Rossi">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Email Google</label>' +
          '<input class="form-input" id="mem-email" type="email" placeholder="mario.rossi@gmail.com">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Ruolo</label>' +
          '<select class="form-select" id="mem-role">' +
            '<option value="socio">Socio</option>' +
            '<option value="attivo" selected>Attivo</option>' +
            '<option value="admin">Amministratore</option>' +
          '</select>' +
        '</div>' +
        '<button class="btn btn-orange btn-block" onclick="PM.components.adminMembers.addMember()">Aggiungi socio</button>' +
      '</div>';

    // ── Filter ──
    html +=
      '<div style="font-size:15px;font-weight:800;margin:20px 0 10px;">Soci</div>' +
      '<div style="margin-bottom:12px;">' +
        '<input class="form-input" id="mem-filter" placeholder="Filtra per nome o email..." value="' + PM._esc(self._filter) + '" oninput="PM.components.adminMembers.onFilterInput(this.value)">' +
      '</div>';

    html += self._renderGroup('Amministratori', admins);
    html += self._renderGroup('Attivi', attivi);
    html += self._renderGroup('Soci', soci);

    if (inactive.length) {
      html += '<div style="font-size:14px;font-weight:700;margin:20px 0 8px;color:var(--gray-l);">Disattivati (' + inactive.length + ')</div>';
      html += '<div class="card" style="padding:0;"><div class="table-wrap"><table><tbody>';
      inactive.forEach(function(m) {
        html +=
          '<tr><td>' + PM._esc(m.full_name) + '<br><span style="font-size:11px;color:var(--gray-l);">' + PM._esc(m.email || '—') + '</span></td>' +
          '<td><button class="btn btn-teal btn-sm" onclick="PM.components.adminMembers.toggleActive(\'' +
            PM._esc(m.email) + '\',\'' + PM._esc(m.full_name) + '\',\'' + PM._esc(m.role) + '\',true)">Riattiva</button></td></tr>';
      });
      html += '</tbody></table></div></div>';
    }

    PM.html(self._container, html);

    var filterEl = document.getElementById('mem-filter');
    if (filterEl && q) {
      filterEl.focus();
      var len = filterEl.value.length;
      filterEl.setSelectionRange(len, len);
    }
  },

  _renderGroup: function(title, members) {
    var html = '<div style="font-size:13px;font-weight:700;color:var(--gray-l);margin:16px 0 8px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.07em;">' + title + ' (' + members.length + ')</div>';

    if (!members.length) {
      return html + '<div class="card card-body" style="color:var(--gray-l);font-size:13px;">Nessuno.</div>';
    }

    html += '<div class="card" style="padding:0;"><div class="table-wrap"><table><thead><tr><th>Nome</th><th>Ruolo</th><th></th></tr></thead><tbody>';
    members.forEach(function(m) {
      var emailEsc = PM._esc(m.email || '');
      var nameEsc  = PM._esc(m.full_name);
      var roleEsc  = PM._esc(m.role);
      var roleSel  =
        '<select class="form-select" style="padding:6px 10px;font-size:12px;height:auto;" onchange="PM.components.adminMembers.changeRole(\'' +
          emailEsc + '\',\'' + nameEsc + '\',this.value,this)">' +
          '<option value="socio"' + (m.role === 'socio' ? ' selected' : '') + '>Socio</option>' +
          '<option value="attivo"' + (m.role === 'attivo' || m.role === 'member' ? ' selected' : '') + '>Attivo</option>' +
          '<option value="admin"' + (m.role === 'admin' ? ' selected' : '') + '>Admin</option>' +
        '</select>';

      html +=
        '<tr>' +
          '<td>' + nameEsc + (m.email ? '<br><span style="font-size:11px;color:var(--gray-l);">' + emailEsc + '</span>' : '') + '</td>' +
          '<td>' + roleSel + '</td>' +
          '<td><button class="btn btn-ghost btn-sm" onclick="PM.components.adminMembers.toggleActive(\'' +
            emailEsc + '\',\'' + nameEsc + '\',\'' + roleEsc + '\',false)">Disattiva</button></td>' +
        '</tr>';
    });
    html += '</tbody></table></div></div>';
    return html;
  },

  addMember: function() {
    var name  = ((document.getElementById('mem-name') || {}).value || '').trim();
    var email = ((document.getElementById('mem-email') || {}).value || '').trim();
    var role  = (document.getElementById('mem-role') || {}).value;

    if (!name)  { PM.toast('Inserisci il nome', 'error'); return; }
    if (!email) { PM.toast('Inserisci l\'email', 'error'); return; }

    PM.api('adminUpsertMember', { full_name: name, email: email, role: role, active: true })
      .then(function() {
        PM.toast('Socio aggiunto');
        document.getElementById('mem-name').value  = '';
        document.getElementById('mem-email').value = '';
        PM.components.adminMembers.render('admin-soci-panel');
      })
      .catch(function(err) { PM.toast(err.message, 'error'); });
  },

  changeRole: function(email, name, newRole) {
    var roleLabel = { admin: 'Amministratore', attivo: 'Attivo', socio: 'Socio' };
    PM.confirm('Cambia ruolo?', 'Vuoi impostare ' + name + ' come ' + (roleLabel[newRole] || newRole) + '?')
      .then(function(ok) {
        if (!ok) { PM.components.adminMembers.render('admin-soci-panel'); return; }
        PM.api('adminUpsertMember', { full_name: name, email: email, role: newRole })
          .then(function() {
            PM.toast(name + ' → ' + (roleLabel[newRole] || newRole));
            PM.components.adminMembers.render('admin-soci-panel');
          })
          .catch(function(err) {
            PM.toast(err.message, 'error');
            PM.components.adminMembers.render('admin-soci-panel');
          });
      });
  },

  toggleActive: function(email, name, role, active) {
    var action = active ? 'riattivare' : 'disattivare';
    PM.confirm(action.charAt(0).toUpperCase() + action.slice(1) + '?', 'Vuoi ' + action + ' ' + name + '?')
      .then(function(ok) {
        if (!ok) return;
        PM.api('adminUpsertMember', { full_name: name, email: email, role: role, active: active })
          .then(function() {
            PM.toast(name + (active ? ' riattivato' : ' disattivato'));
            PM.components.adminMembers.render('admin-soci-panel');
          })
          .catch(function(err) { PM.toast(err.message, 'error'); });
      });
  }
};
</script>
