<script>
/* ComponentAdminLedger — Cassa (bonifici + storico per socio) */

PM.components.adminLedger = {

  state: {
    balances: [],
    members: [],
    expandedMemberId: null,
    memberEntries: null,
    editingEntryId: null
  },

  render: function(container) {
    PM.showLoading(container);
    var self = PM.components.adminLedger;
    self._container = container;

    Promise.all([
      PM.api('adminGetBalances'),
      PM.api('adminGetMembers')
    ]).then(function(results) {
      self.state.balances = results[0];
      self.state.members  = results[1].filter(function(m) { return String(m.active) !== 'false'; });
      self._renderAll();
    }).catch(function(err) {
      PM.html(container,
        '<div class="empty-state"><span class="empty-state-icon">&#9888;&#65039;</span>' +
        '<h2>Errore</h2><p>' + PM._esc(err.message) + '</p>' +
        '<button class="btn btn-orange mt-16" onclick="PM.components.adminLedger.render(\'admin-cassa-panel\')">Riprova</button></div>');
    });
  },

  _renderAll: function() {
    var self    = PM.components.adminLedger;
    var members = self.state.members.slice().sort(function(a, b) { return a.full_name.localeCompare(b.full_name); });

    var html = '';

    // ── Topup form ──
    html +=
      '<div style="font-size:15px;font-weight:800;margin-bottom:12px;">Registra ricarica</div>' +
      '<div class="card card-body">' +
        '<div class="form-group">' +
          '<label class="form-label">Socio</label>' +
          '<select class="form-select" id="topup-member"><option value="">Seleziona socio...</option>';
    members.forEach(function(m) {
      html += '<option value="' + m.member_id + '">' + PM._esc(m.full_name) + '</option>';
    });
    html +=
        '</select></div>' +
        '<div class="form-group">' +
          '<label class="form-label">Importo (€)</label>' +
          '<input class="form-input" id="topup-amount" type="number" step="0.01" min="0.01" placeholder="50.00">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Data</label>' +
          '<input class="form-input" id="topup-date" type="date" value="' + new Date().toISOString().substring(0, 10) + '">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Nota (opzionale)</label>' +
          '<input class="form-input" id="topup-note" placeholder="es. Bonifico gennaio">' +
        '</div>' +
        '<button class="btn btn-teal btn-block" onclick="PM.components.adminLedger.recordTopup()">Registra ricarica</button>' +
      '</div>';

    // ── Balances table ──
    html +=
      '<div style="font-size:15px;font-weight:800;margin:20px 0 8px;">Saldi soci</div>' +
      '<div class="card" style="padding:0;">' +
        '<div class="table-wrap"><table>' +
          '<thead><tr><th>Socio</th><th class="text-right">Saldo</th></tr></thead>' +
          '<tbody id="ledger-members-tbody">';

    self.state.balances.forEach(function(b) {
      var expanded = self.state.expandedMemberId === b.member_id;
      var balClass = b.balance < 0 ? 'balance-negative' : (b.balance > 0 ? 'balance-positive' : '');

      html +=
        '<tr class="clickable" onclick="PM.components.adminLedger.toggleMember(\'' + b.member_id + '\')" ' +
          'style="' + (expanded ? 'background:rgba(88,89,91,0.03);' : '') + '">' +
          '<td>' +
            '<span style="display:inline-block;width:12px;margin-right:6px;transform:' + (expanded ? 'rotate(90deg)' : 'none') + ';transition:transform 0.2s;">▶</span>' +
            PM._esc(b.full_name) +
          '</td>' +
          '<td class="text-right ' + balClass + '" style="font-weight:600;font-family:var(--mono);">' + PM.formatCurrency(b.balance) + '</td>' +
        '</tr>';

      if (expanded) {
        html +=
          '<tr><td colspan="2" style="padding:0;background:rgba(88,89,91,0.02);">' +
            '<div style="padding:16px;" id="ledger-member-detail">' +
              self._renderMemberDetail() +
            '</div>' +
          '</td></tr>';
      }
    });

    html += '</tbody></table></div></div>';
    PM.html(self._container, html);
  },

  _renderMemberDetail: function() {
    var self = PM.components.adminLedger;
    if (!self.state.memberEntries) {
      return '<div style="text-align:center;padding:16px;color:var(--gray-l);font-size:13px;">Caricamento storico...</div>';
    }
    if (!self.state.memberEntries.length) {
      return '<div style="text-align:center;padding:16px;color:var(--gray-l);font-size:13px;">Nessun movimento per questo socio.</div>';
    }
    var rows = self.state.memberEntries.map(function(e) { return self._renderEntryRow(e); }).join('');
    return (
      '<div class="table-wrap"><table style="font-size:12px;">' +
        '<thead><tr><th>Data</th><th>Tipo</th><th class="text-right">Importo</th><th>Nota</th><th></th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table></div>'
    );
  },

  _renderEntryRow: function(e) {
    var self      = PM.components.adminLedger;
    var typeLabel = { topup: 'Bonifico', order_charge: 'Addebito', adjustment: 'Rettifica' }[e.type] || e.type;
    var amtClass  = e.amount < 0 ? 'balance-negative' : (e.amount > 0 ? 'balance-positive' : '');
    var isEditing = self.state.editingEntryId === e.entry_id;

    if (isEditing) {
      return '<tr>' +
        '<td><input class="form-input" type="date" id="edit-date-' + e.entry_id + '" value="' + PM._esc((e.entry_date || '').substring(0, 10)) + '" style="padding:4px 6px;font-size:11px;height:auto;"></td>' +
        '<td>' + PM._esc(typeLabel) + '</td>' +
        '<td><input class="form-input" type="number" step="0.01" id="edit-amount-' + e.entry_id + '" value="' + e.amount + '" style="padding:4px 6px;font-size:11px;height:auto;width:80px;text-align:right;"></td>' +
        '<td><input class="form-input" id="edit-note-' + e.entry_id + '" value="' + PM._esc(e.note || '') + '" style="padding:4px 6px;font-size:11px;height:auto;"></td>' +
        '<td style="white-space:nowrap;">' +
          '<button class="btn btn-orange btn-sm" onclick="PM.components.adminLedger.saveEntry(\'' + e.entry_id + '\')">Salva</button> ' +
          '<button class="btn btn-ghost btn-sm" onclick="PM.components.adminLedger.cancelEdit()">✕</button>' +
        '</td></tr>';
    }

    return '<tr>' +
      '<td>' + PM._esc((e.entry_date || '').substring(0, 10)) + '</td>' +
      '<td>' + PM._esc(typeLabel) + '</td>' +
      '<td class="text-right ' + amtClass + '" style="font-weight:600;font-family:var(--mono);">' + PM.formatCurrency(e.amount) + '</td>' +
      '<td>' + PM._esc(e.note || '') + '</td>' +
      '<td style="white-space:nowrap;text-align:right;">' +
        '<button class="btn btn-ghost btn-sm" title="Modifica" onclick="PM.components.adminLedger.beginEdit(\'' + e.entry_id + '\')">✎</button> ' +
        '<button class="btn btn-ghost btn-sm" style="color:var(--red);" title="Elimina" onclick="PM.components.adminLedger.deleteEntry(\'' + e.entry_id + '\',\'' + e.type + '\')">×</button>' +
      '</td></tr>';
  },

  toggleMember: function(memberId) {
    var self = PM.components.adminLedger;
    if (self.state.expandedMemberId === memberId) {
      self.state.expandedMemberId = null;
      self.state.memberEntries    = null;
      self.state.editingEntryId   = null;
      self._renderAll();
      return;
    }
    self.state.expandedMemberId = memberId;
    self.state.memberEntries    = null;
    self.state.editingEntryId   = null;
    self._renderAll();

    PM.api('adminGetMemberLedger', { member_id: memberId })
      .then(function(entries) {
        if (self.state.expandedMemberId !== memberId) return;
        self.state.memberEntries = entries;
        self._renderAll();
      })
      .catch(function(err) { PM.toast(err.message, 'error'); });
  },

  beginEdit:  function(id) { PM.components.adminLedger.state.editingEntryId = id; PM.components.adminLedger._renderAll(); },
  cancelEdit: function()   { PM.components.adminLedger.state.editingEntryId = null; PM.components.adminLedger._renderAll(); },

  saveEntry: function(entryId) {
    var self = PM.components.adminLedger;
    var date = (document.getElementById('edit-date-' + entryId) || {}).value;
    var amt  = (document.getElementById('edit-amount-' + entryId) || {}).value;
    var note = ((document.getElementById('edit-note-' + entryId) || {}).value || '').trim();

    if (!date) { PM.toast('Inserisci una data', 'error'); return; }
    if (amt === '' || isNaN(parseFloat(amt))) { PM.toast('Importo non valido', 'error'); return; }

    PM.api('adminUpdateLedgerEntry', { entry_id: entryId, amount: parseFloat(amt), note: note, entry_date: date })
      .then(function(res) {
        PM.toast('Movimento aggiornato · saldo: ' + PM.formatCurrency(res.new_balance));
        self.state.editingEntryId = null;
        self._reloadAfterMutation();
      })
      .catch(function(err) { PM.toast(err.message, 'error'); });
  },

  deleteEntry: function(entryId, type) {
    var self = PM.components.adminLedger;
    var msg  = type === 'order_charge'
      ? 'Stai eliminando un addebito ordine. Questo altera il saldo ma non rimuove le righe ordine. Procedere?'
      : 'Eliminare questo movimento?';
    PM.confirm('Elimina movimento', msg).then(function(ok) {
      if (!ok) return;
      PM.api('adminDeleteLedgerEntry', { entry_id: entryId })
        .then(function(res) {
          PM.toast('Movimento eliminato · saldo: ' + PM.formatCurrency(res.new_balance));
          self._reloadAfterMutation();
        })
        .catch(function(err) { PM.toast(err.message, 'error'); });
    });
  },

  _reloadAfterMutation: function() {
    var self     = PM.components.adminLedger;
    var memberId = self.state.expandedMemberId;
    Promise.all([
      PM.api('adminGetBalances'),
      memberId ? PM.api('adminGetMemberLedger', { member_id: memberId }) : Promise.resolve(null)
    ]).then(function(results) {
      self.state.balances = results[0];
      if (results[1]) self.state.memberEntries = results[1];
      self._renderAll();
    }).catch(function(err) { PM.toast(err.message, 'error'); });
  },

  recordTopup: function() {
    var memberId = (document.getElementById('topup-member') || {}).value;
    var amount   = (document.getElementById('topup-amount') || {}).value;
    var date     = (document.getElementById('topup-date') || {}).value;
    var note     = ((document.getElementById('topup-note') || {}).value || '').trim();

    if (!memberId) { PM.toast('Seleziona un socio', 'error'); return; }
    if (!amount || parseFloat(amount) <= 0) { PM.toast('Inserisci un importo valido', 'error'); return; }

    PM.api('adminRecordTopup', {
      member_id:  memberId,
      amount:     parseFloat(amount),
      entry_date: date,
      note:       note || 'Ricarica'
    }).then(function(res) {
      PM.toast('Ricarica registrata · nuovo saldo: ' + PM.formatCurrency(res.new_balance));
      PM.components.adminLedger.render('admin-cassa-panel');
    }).catch(function(err) { PM.toast(err.message, 'error'); });
  }
};
</script>
