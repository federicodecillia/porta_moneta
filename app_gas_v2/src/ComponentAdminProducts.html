<script>
/* ComponentAdminProducts — Caricamento prodotti (testo) */

PM.components.adminProducts = {

  _openCycle: null,
  _products:  [],
  _container: null,
  _recentCycles: [],

  render: function(container) {
    var self = PM.components.adminProducts;
    self._container = container;
    PM.showLoading(container);

    Promise.all([
      PM.api('adminGetRecentCycles'),
    ]).then(function(results) {
      var cycles = results[0] || [];
      self._recentCycles = cycles;
      self._openCycle = null;
      cycles.forEach(function(c) { if (c.status === 'open') self._openCycle = c; });
      self._renderAll();
    }).catch(function(err) {
      PM.html(container,
        '<div class="empty-state"><span class="empty-state-icon">&#9888;&#65039;</span>' +
        '<h2>Errore</h2><p>' + PM._esc(err.message) + '</p>' +
        '<button class="btn btn-orange mt-16" onclick="PM.components.adminProducts.render(\'admin-prodotti-panel\')">Riprova</button></div>');
    });
  },

  _renderAll: function() {
    var self = PM.components.adminProducts;
    var c    = self._openCycle;
    var html = '';

    if (!c) {
      html =
        '<div class="empty-state">' +
        '<span class="empty-state-icon">&#128722;</span>' +
        '<h2>Nessun ciclo aperto</h2>' +
        '<p>Apri un ciclo dalla tab Ciclo per gestire i prodotti.</p>' +
        '</div>';
      PM.html(self._container, html);
      return;
    }

    html +=
      '<div style="font-size:15px;font-weight:800;margin-bottom:4px;">' + PM._esc(c.title) + '</div>' +
      '<div style="font-family:var(--mono);font-size:10px;color:var(--gray-l);margin-bottom:20px;">' +
        'Ciclo aperto · modifica i prodotti visibili ai soci' +
      '</div>';

    // ── Text input ──
    html +=
      '<div style="font-size:15px;font-weight:700;margin-bottom:8px;">Carica prodotti</div>' +
      '<div style="font-family:var(--mono);font-size:11px;color:var(--teal);margin-bottom:10px;">' +
        'Formato: Nome;Varietà;Formato;Prezzo;Fornitore;Note' +
      '</div>' +
      '<div class="form-group">' +
        '<textarea class="form-textarea" id="products-text" rows="10" placeholder="Carota;;500 g;1.75;Biofattoria Rossi;\nMela;Golden;1 kg;2.50;Biofattoria Rossi;\nPasta;Spaghetti;500 g;1.80;;Integrale"></textarea>' +
      '</div>' +
      '<button class="btn btn-orange btn-block" onclick="PM.components.adminProducts.loadProducts()">Carica prodotti</button>';

    // ── Duplicate from previous cycle ──
    var prevCycle = null;
    for (var i = 0; i < self._recentCycles.length; i++) {
      if (self._recentCycles[i].cycle_id !== c.cycle_id && self._recentCycles[i].status !== 'open') {
        prevCycle = self._recentCycles[i];
        break;
      }
    }

    if (prevCycle) {
      html +=
        '<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">' +
          '<div style="font-size:14px;font-weight:700;margin-bottom:8px;">Duplica da ciclo precedente</div>' +
          '<div style="font-size:13px;color:var(--gray);margin-bottom:10px;">' +
            'Copia i prodotti da: <strong>' + PM._esc(prevCycle.title) + '</strong>' +
          '</div>' +
          '<button class="btn btn-primary btn-block" onclick="PM.components.adminProducts.duplicateProducts(\'' + PM._esc(prevCycle.cycle_id) + '\')">' +
            'Duplica prodotti' +
          '</button>' +
        '</div>';
    }

    PM.html(self._container, html);
  },

  loadProducts: function() {
    var self = PM.components.adminProducts;
    var c    = self._openCycle;
    if (!c) { PM.toast('Nessun ciclo aperto', 'error'); return; }

    var rawText = (document.getElementById('products-text') || {}).value || '';
    var lines   = rawText.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);

    if (!lines.length) { PM.toast('Inserisci almeno un prodotto', 'error'); return; }

    var products = [];
    var errors   = [];

    lines.forEach(function(line, idx) {
      var parts = line.split(';');
      var name  = (parts[0] || '').trim();
      var price = parseFloat((parts[3] || '0').replace(',', '.'));

      if (!name) { errors.push('Riga ' + (idx + 1) + ': nome mancante'); return; }
      if (isNaN(price) || price <= 0) { errors.push('Riga ' + (idx + 1) + ': prezzo non valido'); return; }

      products.push({
        name:      name,
        variant:   (parts[1] || '').trim(),
        format:    (parts[2] || '').trim(),
        unit_price: price,
        supplier:  (parts[4] || '').trim(),
        notes:     (parts[5] || '').trim()
      });
    });

    if (errors.length) {
      PM.toast(errors[0] + (errors.length > 1 ? ' (+' + (errors.length - 1) + ' altri)' : ''), 'error');
      return;
    }

    PM.confirm('Caricare ' + products.length + ' prodotti?',
      'I prodotti esistenti del ciclo "' + c.title + '" saranno sostituiti.')
      .then(function(ok) {
        if (!ok) return;
        PM.api('adminUpdateProducts', { cycle_id: c.cycle_id, products: products })
          .then(function(res) {
            PM.toast(res.count + ' prodotti caricati');
            var ta = document.getElementById('products-text');
            if (ta) ta.value = '';
          })
          .catch(function(err) { PM.toast(err.message, 'error'); });
      });
  },

  duplicateProducts: function(sourceCycleId) {
    var self = PM.components.adminProducts;
    var c    = self._openCycle;
    if (!c) { PM.toast('Nessun ciclo aperto', 'error'); return; }

    PM.confirm('Duplicare prodotti?',
      'I prodotti esistenti del ciclo corrente saranno sostituiti con quelli del ciclo precedente.')
      .then(function(ok) {
        if (!ok) return;
        PM.api('adminDuplicateProducts', {
          source_cycle_id: sourceCycleId,
          target_cycle_id: c.cycle_id
        })
          .then(function(res) { PM.toast(res.count + ' prodotti duplicati'); })
          .catch(function(err) { PM.toast(err.message, 'error'); });
      });
  }
};
</script>
